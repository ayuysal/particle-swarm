<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle Swarm — KI Visualisierung</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
    }

    .controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 12px;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
    }

    .controls button {
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      letter-spacing: 0.3px;
    }

    .controls button:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .controls button.active {
      background: rgba(79, 70, 229, 0.4);
      border-color: rgba(79, 70, 229, 0.6);
      box-shadow: 0 0 20px rgba(79, 70, 229, 0.3);
    }

    .info {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 10;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.5px;
    }

    .info span {
      color: rgba(255, 255, 255, 0.7);
    }

    .fps {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 10;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div class="info">PARTICLE SWARM <span>— 5000 Partikel</span></div>
  <div class="fps" id="fps">0 FPS</div>
  <canvas id="canvas"></canvas>

  <div class="controls">
    <button class="active" data-mode="swarm">Schwarm</button>
    <button data-mode="text">Text</button>
    <button data-mode="wave">Welle</button>
    <button data-mode="chart">Chart</button>
    <button data-mode="sphere">Sphäre</button>
    <button data-mode="dna">DNA</button>
    <button data-mode="heart">Herz</button>
    <button data-mode="spiral">Spiral</button>
  </div>

  <script src="particles.js"></script>
</body>
</html>
